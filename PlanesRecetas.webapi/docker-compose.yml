services:
  planes-postgres:
    image: postgres:15
    container_name: planes_postgres
    networks:
      - shared-network
    restart: always
    env_file:
      - postgres.env
    ports:
      - '5022:5432'
    volumes:
      - posgrest-server-data:/var/lib/postgresql/data
    user: "0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appservice"]
      interval: 5s
      timeout: 5s
      retries: 10
  planes-migrate:
    image: ikaru773/planesrecetaswebapi
    command: ["dotnet", "PlanesRecetas.WebApi.dll", "--migrate"]
    depends_on:
      planes-postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DataBaseSettings__ConnectionString=Host=planes-postgres;Port=5432;Database=appservice;Username=postgres;Password=Password12345;
    networks:
      - shared-network
  planes-api:
    image: ikaru773/planesrecetaswebapi
    container_name: planes_receta_api
    ports:
      - "1700:1700"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      
      # Database Settings (pointing to the sqlserver container)
      - DataBaseSettings__ConnectionString=Host=planes-postgres;Port=5432;Database=appservice;Username=postgres;Password=Password12345;
      
      # Serilog
      - Serilog__MinimumLevel__Default=Information
      - Serilog__MinimumLevel__Override__Microsoft=Warning
      - Serilog__MinimumLevel__Override__System=Warning
      
      
      # Vault / Secret Manager (Set to true or false as needed)
      - UseSecretManager=false
      
      # JWT Options
      - JwtOptions__Lifetime=30
      - JwtOptions__SecretKey=DiplomadoMicroservicios2025SecretoJTWApiSecurity
      - JwtOptions__ValidAudience=storeApp
      - JwtOptions__ValidIssuer=api_security
      - JwtOptions__ValidateAudience=false
      - JwtOptions__ValidateIssuer=true
      - JwtOptions__ValidateLifetime=true

      
      # RabbitMQ (pointing to the rabbitmq container)
      - RabbitMqSettings__Host=rabbitmq
      - RabbitMqSettings__Port=5672
      - RabbitMqSettings__UserName=admin
      - RabbitMqSettings__Password=StrongPassword123
      - RabbitMqSettings__QueueName=plan-created
      - RabbitMqSettings__VirtualHost=/
      
      # Service Registration & Monitoring
      - ServiceRegistration__ServiceDiscoveryAddress=http://consul:8500
      - ServiceRegistration__Host=http://api-plan
      - ServiceRegistration__Port=8090
      - ServiceRegistration__ServiceId=catalog
      - Seq__ServerUrl=http://seq:5341
      - JaegerSettings__Host=jaeger
      - JaegerSettings__Port=6831
    networks:
      - shared-network  # 
    depends_on:
      planes-postgres:
        condition: service_healthy
  planes-worker:
    image: ikaru773/plans-worker
    container_name: plans-worker
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      
      # Database Settings (pointing to the sqlserver container)
      - DataBaseSettings__ConnectionString=Host=planes-postgres;Port=5432;Database=appservice;Username=postgres;Password=Password12345;
      # RabbitMQ (pointing to the rabbitmq container)
      - RabbitMqSettings__Host=rabbitmq
      - RabbitMqSettings__Port=5672
      - RabbitMqSettings__UserName=admin
      - RabbitMqSettings__Password=StrongPassword123
      - RabbitMqSettings__QueueName=plan-created
      - RabbitMqSettings__VirtualHost=/
    networks:
      - shared-network  # 
    depends_on:
      planes-postgres:
        condition: service_healthy
  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '3100:3100'
    volumes:
      # Map the local folder 'loki/data' to '/loki' inside the container
      - ../loki/data:/loki 
      # Map your local config file to the path Loki expects (fixed 'ect' to 'etc')
      - ../loki/config.yml:/etc/loki/local-config.yaml
    networks:
     - shared-network
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # Map the local folder 'loki/data' to '/loki' inside the container
      - ../prometheus:/etc/prometheus
      # Map your local config file to the path Loki expects (fixed 'ect' to 'etc')
      - ../prometheus/data:/prometheus
    command:
      - --config.file=/etc/prometheus/config.yml
      - --storage.tsdb.retention.time=30d
    networks:
      - shared-network
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP= false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      
    volumes:
      - ../grafana/data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning    
    networks:
      - shared-network  

volumes:
 posgrest-server-data:
    driver: local
  # The rest of your volumes were removed as they conflicted with standard SQL Server paths
  # If you need them, they must be defined here with the correct syntax:
  # sqldata:
  # sqllog:
  # sqlbackup:
networks:
  shared-network:
    driver: bridge 
